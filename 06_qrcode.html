<body>

    <div class="qr-wrapper">
        <div class="main-card">
            <div class="section-title">
                <h2>Pro QR Generator</h2>
                <p style="color: #94a3b8;">Create custom high-quality QR codes</p>
            </div>

            <div class="input-group" style="margin-bottom: 25px;">
                <label>Content (URL or Text)</label>
                <input type="text" id="qrText" placeholder="https://toolnovax.vercel.app/">
            </div>


            <div class="color-selection-box">
                <div class="color-item">
                    <div class="color-circle-wrapper">
                        <input type="color" id="qrColor" value="#6366f1">
                    </div>
                    <label>QR Color</label>
                </div>
                
                <div class="color-item">
                    <div class="color-circle-wrapper">
                        <input type="color" id="qrGradient" value="#00d4ff">
                    </div>
                    <label>Gradient</label>
                </div>
                
                <div class="color-item">
                    <div class="color-circle-wrapper">
                        <input type="color" id="qrBgColor" value="#ffffff">
                    </div>
                    <label>Background</label>
                </div>
            </div>

            <div class="controls-grid">
                <div class="input-group">
                    <label>QR Style</label>
                    <select id="qrType" style="height: 45px; padding: 5px;">
                        <option value="square">Square</option>
                        <option value="rounded">Rounded</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Add Logo (Optional)</label>
                    <input type="file" id="qrLogo" accept="image/*" style="padding: 8px;">
                </div>
            </div>

            <button class="qr-btn" onclick="generateQR()">Generate QR Code</button>

            <div id="resultArea">
                <div class="result-card">
                    <div style="text-align: center;">
                        <img id="qrPreview" class="preview-img" src="" alt="QR Preview">
                    </div>
                    <div style="flex: 1;">
                        <div class="info-badge">Format: PNG</div>
                        <div class="info-badge">Status: Ready to Download</div>
                        <div style="display: flex; gap: 10px;">
                            <a id="qrDownload" class="download-link" href="#" download>Download Now</a>
                            <a href="06_qrcode.html" class="btn-reset" style="margin-top: 15px; display: inline-block;">Reset</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
