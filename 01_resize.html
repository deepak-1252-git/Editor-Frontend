<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Resize Image | ToolNOVA</title>
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="./static/base.css">
    <link rel="stylesheet" href="./static/switch.css">
    <link rel="stylesheet" href="./static/01_resize.css"> 
    <script>
        window.BACKEND_URL = "https://toolnova-n187.onrender.com";
    </script>
</head>
<body>
    <nav>
        <div class="logo-container">
            <img src="./static/logo.png" alt="ToolNOVA Logo" class="nav-logo">
            <h1>ToolNOVA</h1>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="01_resize.html">Resize</a>
            <a href="02_compress.html">Compress</a>
            <a href="03_convert.html">Convert</a>
            <a href="04_pdftool.html">PDF pro</a>
            <a href="05_croprotate.html">Crop+Rotate</a>
            <a href="#">About</a>
        </div>
    </nav>
    
    <div class="resizer-wrapper">
        <div class="main-card">
            <div class="section-title">
                <h2>Image Resizer</h2>
                <p style="color: #94a3b8;">Change resolution instantly with zero quality loss.</p>
            </div>

            <form id="uploadForm" enctype="multipart/form-data">
                <div class="upload-box" onclick="document.getElementById('fileInput').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <h4 id="fileLabel">Choose Image or Drag & Drop</h4>
                    <p id="fileSizeDisplay" style="font-size: 0.8rem; color: var(--secondary); margin: 0;"></p> 
                    <input type="file" id="fileInput" name="image" accept="image/*" hidden >
                </div>

                <div class="controls-grid">
                    <div class="input-group">
                        <label>Target Width (px)</label>
                        <input type="number" id="targetWidth" name="width" placeholder="e.g. 1920" required>
                    </div>
                    <div class="input-group">
                        <label>Target Height (px)</label>
                        <input type="number" id="targetHeight" name="height" placeholder="e.g. 1080" required>
                    </div>
                </div>

                <button type="submit" class="resize-btn" id="submitBtn">
                    <span id="btnText">Process & Resize</span>
                </button>
            </form>

            <div id="resultArea" style="display: none;"> <h4 style="margin-bottom: 20px; font-weight: 700;">✨ Your Image is Ready!</h4>
                <div class="result-card">
                    <img id="resImg" class="preview-img" src="" alt="Resized">
                    <div class="result-info">
                        <div class="info-badge">📏 <span id="resRes"></span></div>
                        <div class="info-badge">💾 <span id="resSize"></span></div>
                        <a id="resDownload" href="#" class="download-link">📥 Download Now</a>
                        <a href="01_resize.html" class="btn-reset">↺ New File</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-container">
            <div class="footer-bottom">
                <p>&copy; 2026 <strong>ToolNOVA</strong>. Made with ❤️ for a better web.</p>
            </div>
        </div>
    </footer>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="./static/01_resize.js"></script>
</body>
</html>
